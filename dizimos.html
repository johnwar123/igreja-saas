<!DOCTYPE html>
<html>
<head>
  <title>Dízimos - Igreja SaaS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f2f5; font-family: Arial; }
    header {
      background: #0f3460;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 20px; }
    header button {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .container {
      padding: 30px;
      max-width: 900px;
      margin: 0 auto;
    }
    h2 { color: #0f3460; margin: 20px 0 15px; }
    .resumo {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .resumo-card {
      background: white;
      padding: 20px 30px;
      border-radius: 15px;
      flex: 1;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      min-width: 150px;
    }
    .resumo-card p { color: gray; font-size: 14px; }
    .resumo-card h3 { color: #0f3460; font-size: 26px; margin-top: 5px; }
    .formulario {
      background: white;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 2px solid #eee;
      border-radius: 8px;
      font-size: 15px;
    }
    input:focus, select:focus {
      border-color: #0f3460;
      outline: none;
    }
    .btn {
      background: #0f3460;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 10px;
      width: 100%;
    }
    table {
      width: 100%;
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      border-collapse: collapse;
    }
    th {
      background: #0f3460;
      color: white;
      padding: 15px;
      text-align: left;
    }
    td { padding: 12px 15px; border-bottom: 1px solid #eee; }
    tr:hover { background: #f0f2f5; }
    .btn-apagar {
      background: #e94560;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <header>
    <h1>✝️ Igreja Fácil — Dízimos</h1>
    <button onclick="location.href='dashboard.html'">← Voltar</button>
  </header>

  <div class="container">

    <div class="resumo">
      <div class="resumo-card">
        <p>💰 Total do Mês</p>
        <h3 id="total">R$ 0,00</h3>
      </div>
      <div class="resumo-card">
        <p>📋 Registros</p>
        <h3 id="registros">0</h3>
      </div>
      <div class="resumo-card">
        <p>📈 Maior Oferta</p>
        <h3 id="maior">R$ 0,00</h3>
      </div>
    </div>

    <h2>💰 Registrar Dízimo</h2>
    <div class="formulario">
      <input type="text" id="nome" placeholder="Nome do membro">
      <input type="number" id="valor" placeholder="Valor (R$)">
      <input type="date" id="data">
      <select id="tipo">
        <option value="Dízimo">Dízimo</option>
        <option value="Oferta">Oferta</option>
        <option value="Missões">Missões</option>
      </select>
      <button class="btn" onclick="registrar()">➕ Registrar</button>
    </div>

    <h2>📋 Histórico</h2>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Valor</th>
          <th>Data</th>
          <th>Tipo</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>

  </div>

  <script>
    var contador = 1;
    var totalGeral = 0;
    var maiorOferta = 0;

    function registrar() {
      var nome = document.getElementById("nome").value;
      var valor = parseFloat(document.getElementById("valor").value);
      var data = document.getElementById("data").value;
      var tipo = document.getElementById("tipo").value;

      if (nome == "" || isNaN(valor)) {
        alert("Preencha nome e valor!");
        return;
      }

      totalGeral += valor;
      if (valor > maiorOferta) maiorOferta = valor;

      document.getElementById("total").innerHTML = "R$ " + totalGeral.toFixed(2);
      document.getElementById("registros").innerHTML = contador;
      document.getElementById("maior").innerHTML = "R$ " + maiorOferta.toFixed(2);

      var tabela = document.getElementById("tabela");
      var linha = tabela.insertRow();
      linha.innerHTML =
        "<td>" + contador + "</td>" +
        "<td>" + nome + "</td>" +
        "<td>R$ " + valor.toFixed(2) + "</td>" +
        "<td>" + data + "</td>" +
        "<td>" + tipo + "</td>" +
        "<td><button class='btn-apagar' onclick='apagar(this," + valor + ")'>🗑️</button></td>";

      contador++;
      document.getElementById("nome").value = "";
      document.getElementById("valor").value = "";
    }

    function apagar(btn, valor) {
      totalGeral -= valor;
      contador--;
      document.getElementById("total").innerHTML = "R$ " + totalGeral.toFixed(2);
      document.getElementById("registros").innerHTML = contador - 1;
      btn.parentElement.parentElement.remove();
    }
  </script>

</body>
</html>
