<!DOCTYPE html>
<html>
  <head>
    <title>Dashboard - Igreja SaaS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #f0f2f5;
        font-family: Arial;
      }
      header {
        background: #0f3460;
        color: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header h1 {
        font-size: 22px;
      }
      header button {
        background: #e94560;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }
      .bemvindo {
        background: #0f3460;
        color: white;
        padding: 20px 30px;
        font-size: 16px;
      }
      .cards {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 30px;
        justify-content: center;
      }
      .card {
        background: white;
        border-radius: 15px;
        padding: 30px;
        width: 200px;
        text-align: center;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        transition: transform 0.2s;
      }
      .card:hover {
        transform: translateY(-5px);
      }
      .card .icone {
        font-size: 50px;
        margin-bottom: 10px;
      }
      .card h3 {
        color: #1a1a2e;
        font-size: 16px;
        margin-bottom: 5px;
      }
      .card p {
        color: gray;
        font-size: 13px;
      }
      .card .numero {
        font-size: 30px;
        font-weight: bold;
        color: #0f3460;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>✝️ Igreja Fácil</h1>
      <button onclick="sair()">Sair</button>
    </header>
    <div class="bemvindo">
      👋 Bem-vindo, Pastor! Hoje é um ótimo dia para servir.
    </div>

    <div class="cards">
      <div class="card" onclick="location.href='membros.html'">
        <div class="icone">👥</div>
        <h3>Membros</h3>
        <p>Cadastro de membros</p>
        <div class="numero">248</div>
      </div>

      <div class="card" onclick="location.href='dizimos.html'">
        <div class="icone">💰</div>
        <h3>Dízimos</h3>
        <p>Controle financeiro</p>
        <div class="numero">R$12.500</div>
      </div>

      <div class="card" onclick="location.href='evento.html'">
        <div class="icone">📅</div>
        <h3>Eventos</h3>
        <p>Agenda da igreja</p>
        <div class="numero">5</div>
      </div>

      <div class="card" onclick="location.href='relatorios.html'">
        <div class="icone">📊</div>
        <h3>Relatórios</h3>
        <p>Análises e gráficos</p>
        <div class="numero">↗️</div>
      </div>

      <div class="card" onclick="location.href='louvor.html'">
        <div class="icone">🎵</div>
        <h3>Louvor</h3>
        <p>Repertório de músicas</p>
        <div class="numero">32</div>
      </div>

      <div class="card" onclick="location.href='comunicados.html'">
        <div class="icone">📢</div>
        <h3>Comunicados</h3>
        <p>Avisos para membros</p>
        <div class="numero">3</div>
      </div>
    </div>

    <script>
      function sair() {
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
