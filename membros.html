<!DOCTYPE html>
<html>
  <head>
    <title>Membros - Igreja SaaS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #f0f2f5; font-family: Arial; }
      header {
        background: #0f3460; color: white; padding: 15px 30px;
        display: flex; justify-content: space-between; align-items: center;
      }
      header h1 { font-size: 22px; }
      header button {
        background: #e94560; color: white; border: none;
        padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px;
      }
      .conteudo { padding: 30px; max-width: 800px; margin: 0 auto; }
      h2 { margin-bottom: 20px; color: #1a1a2e; }
      .form-area {
        background: white; border-radius: 12px; padding: 20px;
        margin-bottom: 25px; box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      }
      .form-area input, .form-area select {
        width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px;
      }
      .form-area button {
        background: #0f3460; color: white; border: none; padding: 10px 20px;
        border-radius: 8px; cursor: pointer; font-size: 14px;
        grid-column: span 2;
      }
      .contador {
        background: #0f3460; color: white; border-radius: 12px; padding: 15px 20px;
        margin-bottom: 20px; font-size: 18px; font-weight: bold; text-align: center;
      }
      table {
        width: 100%; border-collapse: collapse; background: white;
        border-radius: 12px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      }
      th, td { padding: 12px 15px; text-align: left; font-size: 14px; }
      th { background: #0f3460; color: white; }
      tr:nth-child(even) { background: #f7f7f7; }
      .remover {
        background: none; border: none; color: #e94560; font-size: 16px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>✝️ Igreja Fácil</h1>
      <button onclick="location.href='dashboard.html'">Voltar</button>
    </header>
    <div class="conteudo">
      <h2>👥 Membros</h2>

      <div class="contador">Total de membros: <span id="total">0</span></div>

      <div class="form-area">
        <input type="text" id="nome" placeholder="Nome completo">
        <input type="text" id="telefone" placeholder="Telefone">
        <input type="email" id="email" placeholder="E-mail (opcional)">
        <select id="status">
          <option value="Ativo">Ativo</option>
          <option value="Inativo">Inativo</option>
        </select>
        <button onclick="adicionarMembro()">Adicionar Membro</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Telefone</th>
            <th>E-mail</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>
    </div>

    <script>
      let membros = JSON.parse(localStorage.getItem('membros')) || [];

      function renderizar() {
        const lista = document.getElementById('lista');
        lista.innerHTML = '';
        membros.forEach((m, i) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${m.nome}</td>
            <td>${m.telefone}</td>
            <td>${m.email || '-'}</td>
            <td>${m.status}</td>
            <td><button class="remover" onclick="removerMembro(${i})">✕</button></td>
          `;
          lista.appendChild(tr);
        });
        document.getElementById('total').textContent = membros.length;
      }

      function adicionarMembro() {
        const nome = document.getElementById('nome').value.trim();
        const telefone = document.getElementById('telefone').value.trim();
        const email = document.getElementById('email').value.trim();
        const status = document.getElementById('status').value;

        if (!nome || !telefone) {
          alert('Preencha nome e telefone.');
          return;
        }

        membros.push({ nome, telefone, email, status });
        salvar();
        renderizar();

        document.getElementById('nome').value = '';
        document.getElementById('telefone').value = '';
        document.getElementById('email').value = '';
        document.getElementById('status').value = 'Ativo';
      }

      function removerMembro(i) {
        membros.splice(i, 1);
        salvar();
        renderizar();
      }

      function salvar() {
        localStorage.setItem('membros', JSON.stringify(membros));
      }

      renderizar();
    </script>
  </body>
</html>
