<!DOCTYPE html>
<html>
<head>
  <title>Eventos - Igreja SaaS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f2f5; font-family: Arial; }

    header {
      background: linear-gradient(135deg, #0f3460, #16213e);
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 3px 15px rgba(0,0,0,0.3);
    }
    header h1 { font-size: 20px; }
    header button {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    .container {
      padding: 30px;
      max-width: 950px;
      margin: 0 auto;
    }

    .titulo-secao {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 25px 0 15px;
      color: #0f3460;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 3px solid #0f3460;
      padding-bottom: 8px;
    }

    .formulario {
      background: white;
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .linha {
      display: flex;
      gap: 15px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 15px;
      font-family: Arial;
      transition: border 0.3s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #0f3460;
      outline: none;
    }

    .btn {
      background: linear-gradient(135deg, #0f3460, #16213e);
      color: white;
      border: none;
      padding: 13px 30px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      width: 100%;
      transition: opacity 0.3s;
    }
    .btn:hover { opacity: 0.85; }

    .eventos-lista {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .evento-card {
      background: white;
      border-radius: 15px;
      padding: 20px 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 6px solid #0f3460;
      transition: transform 0.2s;
    }
    .evento-card:hover { transform: translateX(5px); }

    .evento-card .info h3 {
      color: #0f3460;
      font-size: 18px;
      margin-bottom: 6px;
    }
    .evento-card .info p {
      color: gray;
      font-size: 14px;
      margin-top: 3px;
    }

    .evento-direita {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .data-badge {
      background: linear-gradient(135deg, #0f3460, #16213e);
      color: white;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      min-width: 110px;
    }

    .tag-tipo {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    .culto { background: #d4edda; color: #155724; }
    .louvor { background: #cce5ff; color: #004085; }
    .missao { background: #fff3cd; color: #856404; }
    .outro { background: #f8d7da; color: #721c24; }

    .btn-apagar {
      background: #e94560;
      color: white;
      border: none;
      padding: 7px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .vazio {
      text-align: center;
      color: gray;
      padding: 40px;
      background: white;
      border-radius: 15px;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <header>
    <h1>✝️ Igreja SaaS — Eventos</h1>
    <button onclick="location.href='dashboard.html'">← Voltar</button>
  </header>

  <div class="container">

    <div class="titulo-secao">📅 Criar Novo Evento</div>

    <div class="formulario">
      <input type="text" id="titulo" placeholder="📌 Título do evento">
      <div class="linha">
        <input type="date" id="data">
        <input type="time" id="hora">
      </div>
      <input type="text" id="local" placeholder="📍 Local do evento">
      <select id="tipo">
        <option value="culto">🙏 Culto</option>
        <option value="louvor">🎵 Louvor</option>
        <option value="missao">✈️ Missão</option>
        <option value="outro">📌 Outro</option>
      </select>
      <textarea id="descricao" rows="3" placeholder="📝 Descrição do evento"></textarea>
      <button class="btn" onclick="criarEvento()">➕ Criar Evento</button>
    </div>

    <div class="titulo-secao">📋 Próximos Eventos</div>

    <div class="eventos-lista" id="lista">
      <div class="evento-card">
        <div class="info">
          <h3>🙏 Culto Dominical</h3>
          <p>📍 Templo Principal &nbsp;|&nbsp; 🕘 09:00</p>
          <p>Culto de adoração e palavra de Deus</p>
        </div>
        <div class="evento-direita">
          <div class="data-badge">📅 15/06/2026</div>
          <span class="tag-tipo culto">Culto</span>
          <button class="btn-apagar" onclick="apagar(this)">🗑️ Apagar</button>
        </div>
      </div>

      <div class="evento-card">
        <div class="info">
          <h3>🎵 Noite de Louvor</h3>
          <p>📍 Salão de Eventos &nbsp;|&nbsp; 🕖 19:00</p>
          <p>Noite especial de adoração e worship</p>
        </div>
        <div class="evento-direita">
          <div class="data-badge">📅 20/06/2026</div>
          <span class="tag-tipo louvor">Louvor</span>
          <button class="btn-apagar" onclick="apagar(this)">🗑️ Apagar</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    function criarEvento() {
      var titulo = document.getElementById("titulo").value;
      var data = document.getElementById("data").value;
      var hora = document.getElementById("hora").value;
      var local = document.getElementById("local").value;
      var tipo = document.getElementById("tipo").value;
      var descricao = document.getElementById("descricao").value;

      if (titulo == "") {
        alert("Digite o título do evento!");
        return;
      }

      var nomes = { culto: "Culto", louvor: "Louvor", missao: "Missão", outro: "Outro" };
      var icones = { culto: "🙏", louvor: "🎵", missao: "✈️", outro: "📌" };

      var lista = document.getElementById("lista");
      var card = document.createElement("div");
      card.className = "evento-card";
      card.innerHTML =
        "<div class='info'>" +
          "<h3>" + icones[tipo] + " " + titulo + "</h3>" +
          "<p>📍 " + local + " &nbsp;|&nbsp; 🕐 " + hora + "</p>" +
          "<p>" + descricao + "</p>" +
        "</div>" +
        "<div class='evento-direita'>" +
          "<div class='data-badge'>📅 " + data + "</div>" +
          "<span class='tag-tipo " + tipo + "'>" + nomes[tipo] + "</span>" +
          "<button class='btn-apagar' onclick='apagar(this)'>🗑️ Apagar</button>" +
        "</div>";

      lista.appendChild(card);

      document.getElementById("titulo").value = "";
      document.getElementById("local").value = "";
      document.getElementById("descricao").value = "";
    }

    function apagar(btn) {
      btn.parentElement.parentElement.remove();
    }
  </script>

</body>
</html>
